services:
  postgres:
    image: postgres:17
    container_name: mini-doodle-postgres
    environment:
      POSTGRES_DB: doodle_scheduling
      POSTGRES_USER: doodle_user
      POSTGRES_PASSWORD: doodle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doodle_user -d doodle_scheduling"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: